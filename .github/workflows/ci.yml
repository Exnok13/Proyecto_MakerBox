name: CI 

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  ## Job para descargar las dependencias 
  build:
    runs-on: ubuntu-latest
     
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Instalar dependencias
      run: npm install

    - name: Instalar dependencias del Backend
      run: cd backend && npm install

    - name: Instalar dependencias del frontend
      run: cd fronted && npm install

    - name: Generar cliente de Prisma
      run: npx prisma generate --schema=./backend/prisma/schema.prisma
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Verificar Build del Backend
      run: cd backend && npm run build

    - name: Verificar Build del Frontend
      run: cd fronted && npm run build

    - name: Ejecutar Lint
      run: npm run lint

  ## Job para pruebas unitarias
  pruebas-unitarias:
    runs-on: ubuntu-latest
    ## Necesita para el primer job para que corra
    needs: build 
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Instalar dependencias del Backend
      run: cd backend && npm install

    - name: Generar cliente de Prisma
      run: cd backend && npx prisma generate
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Ejecutar Pruebas Unitarias
      run: cd backend && npm run test:cov -- --coverageDirectory=coverage/unit

    - name: Subir reportes a Codecov (Unit)
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
  ## Job para pruebas de integración
  integracion-test:
    runs-on: ubuntu-latest
    ## Necesita para el primer job para que corra
    needs: build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: db_password
          POSTGRES_DB: makerbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Instalar dependencias del Backend
      run: cd backend && npm install

    - name: Generar cliente de Prisma
      run: cd backend && npx prisma generate
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Desplegar esquema de Prisma en BD de Pruebas
      env:
        DATABASE_URL: postgresql://db_user:db_password@localhost:5432/makerbox_test?schema=public
      run: |
        cd backend
        npx prisma migrate deploy

    - name: Ejecutar Pruebas de Integración (e2e)
      env:
        DATABASE_URL: postgresql://db_user:db_password@localhost:5432/makerbox_test?schema=public
      run: |
        cd backend
        npm run test:e2e:cov -- --coverageDirectory=coverage/e2e

    - name: Subir reportes a Codecov (e2e)
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
  deploy-produccion:
    name: Despliegue a Vercel (CD)
    runs-on: ubuntu-latest
    needs: [build, pruebas-unitarias, integracion-test]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI (Última versión)
        run: npm install -g vercel@latest

      - name: Desplegar a Vercel en Producción
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
