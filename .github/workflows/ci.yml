name: CI 

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: db_password
          POSTGRES_DB: makerbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Instalar dependencias
      run: npm install

    - name: Instalar dependencias del Backend
      run: cd backend && npm install

    - name: Instalar dependencias del frontend
      run: cd fronted && npm install

    - name: Generar cliente de Prisma
      run: npx prisma generate --schema=./backend/prisma/schema.prisma
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Verificar Build del Backend
      run: cd backend && npm run build

    - name: Verificar Build del Frontend
      run: cd fronted && npm run build

    - name: Ejecutar Lint
      run: npm run lint
      
    - name: Desplegar esquema de Prisma en Base de Datos de Pruebas
      env:
        DATABASE_URL: postgresql://db_user:db_password@localhost:5432/makerbox_test?schema=public
      run: |
        cd backend
        npx prisma migrate deploy


    - name: Ejecutar Pruebas Unitarias e Integración con Cobertura Independiente
      env:
        DATABASE_URL: postgresql://db_user:db_password@localhost:5432/makerbox_test?schema=public
      run: |
        cd backend
        # Forzamos directorios separados por CLI para que un reporte no borre al otro
        npm run test:cov -- --coverageDirectory=coverage/unit
        npm run test:e2e:cov -- --coverageDirectory=coverage/e2e

    - name: Subir reportes a Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
      
        fail_ci_if_error: true